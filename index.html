  overflow: hidden;

.stage {
  width: 100%; height: 100vh;
  display: flex; align-items: center; justify-content: center;
}

/* The logo container — holds the image + 3 colour overlay zones */
.logo-wrap {
  position: relative;
  width: min(520px, 80vw);
}

.logo-wrap img {
  width: 100%;
  height: auto;
  display: block;
  /* Base: render as darkest green */
  filter: brightness(0);
  pointer-events: none;
  user-select: none;
}

/*
  Three clickable zones over the logo image.
  Image is 900x636px rendered at min(520px, 80vw).
  Logo content sits at:
    x: 20.2% to 80.8%  (width = 60.6%)
    y: 20.3% to 75.1%  (height = 54.8%)
  Guide 1 (M|P split): 46.7% of image width
  Guide 2 (P|E split): 60.1% of image width
*/

.zone {
  position: absolute;
  top: 20.3%;
  height: 54.8%;
  cursor: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgdmlld0JveD0iMCAwIDIwIDIwIj4KICA8Y2lyY2xlIGN4PSIxMCIgY3k9IjEwIiByPSI3IiBmaWxsPSJub25lIiBzdHJva2U9IiNmZjAwMDAiIHN0cm9rZS13aWR0aD0iMS4yIi8+CiAgPGxpbmUgeDE9IjAiIHkxPSIxMCIgeDI9IjUiIHkyPSIxMCIgc3Ryb2tlPSIjZmYwMDAwIiBzdHJva2Utd2lkdGg9IjEuMiIvPgogIDxsaW5lIHgxPSIxNSIgeTE9IjEwIiB4Mj0iMjAiIHkyPSIxMCIgc3Ryb2tlPSIjZmYwMDAwIiBzdHJva2Utd2lkdGg9IjEuMiIvPgogIDxsaW5lIHgxPSIxMCIgeTE9IjAiIHgyPSIxMCIgeTI9IjUiIHN0cm9rZT0iI2ZmMDAwMCIgc3Ryb2tlLXdpZHRoPSIxLjIiLz4KICA8bGluZSB4MT0iMTAiIHkxPSIxNSIgeDI9IjEwIiB5Mj0iMjAiIHN0cm9rZT0iI2ZmMDAwMCIgc3Ryb2tlLXdpZHRoPSIxLjIiLz4KICA8Y2lyY2xlIGN4PSIxMCIgY3k9IjEwIiByPSIxIiBmaWxsPSIjZmYwMDAwIi8+Cjwvc3ZnPg==") 10 10, crosshair;
}

/* M: logo left edge → guide 1 */
#z-m { left: 20.2%; width: 22.3%; } /* 46.7 - 20.2 */
/* P: guide 1 → guide 2 */
#z-p { left: 42.5%; width: 21.5%; } /* 60.1 - 46.7 */
/* E: guide 2 → logo right edge */
#z-e { left: 55.5%; width: 25.3%; } /* 80.8 - 60.1 */


/* Colour overlays — clipped to letter shapes, triggered by zone hover */
.ov {
  position: absolute; inset: 0;
  mix-blend-mode: screen;
  opacity: 0; transition: opacity 0.2s ease;
  pointer-events: none;
}
/* M — olive green, clipped to M letter zone */
.ov-m {
  background: #4a5e2a;
  clip-path: inset(20.3% 57.5% 24.9% 20.2%);
}
/* P — clay, clipped to P letter zone */
.ov-p {
  background: #8B7355;
  clip-path: polygon(42.5% 20.3%, 64.0% 20.3%, 60.0% 47.7%, 55.5% 75.1%, 42.5% 75.1%);
}
/* E — navy blue, clipped to E letter zone */
.ov-e {
  background: #1a2a6c;
  clip-path: polygon(64.0% 20.3%, 80.8% 20.3%, 80.8% 75.1%, 55.5% 75.1%, 60.0% 47.7%);
}
/* Hover triggers via CSS sibling selector */
#z-m:hover ~ .ov-m { opacity: 1; }
#z-p:hover ~ .ov-p { opacity: 1; }
#z-e:hover ~ .ov-e { opacity: 1; }

/* We handle colour via filter on the img clone approach instead */
/* Use a stacked image approach: base img (dark green) + per-letter coloured img clipped */

/* ---- COLOURED LETTER LAYERS ---- */
.letter-layer { transition: filter 0.2s ease;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  user-select: none;
  transition: filter 0.2s ease, opacity 0.2s ease;
}

/* M layer: clip to M zone, darkest green */
.layer-m {
  clip-path: inset(20.3% 57.5% 24.9% 20.2%);
  filter: brightness(0);
}
/* P layer: clip to P zone, mid green */
.layer-p {
  clip-path: polygon(42.5% 20.3%, 64.0% 20.3%, 60.0% 47.7%, 55.5% 75.1%, 42.5% 75.1%);
  filter: brightness(0);
}
/* E layer: clip to E zone, lightest green */
.layer-e {
  clip-path: polygon(64.0% 20.3%, 80.8% 20.3%, 80.8% 75.1%, 55.5% 75.1%, 60.0% 47.7%);
  filter: brightness(0);
}

/* Hover: brighten + slight scale on zone → triggers letter layer glow */

/* Bottom links */
.bottom-links {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  gap: 40px; padding: 20px;
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
}
.bottom-links a { color: #000; text-decoration: none; transition: opacity 0.2s; }
.bottom-links a:hover { opacity: 0.3; }

/* Tooltip */
.tip {
  position: fixed; pointer-events: none; z-index: 100;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: #000; opacity: 0; transition: opacity 0.15s;
  transform: translate(-50%, -200%);
  white-space: nowrap;
}
.tip.show { opacity: 1; }
</style>

<div class="tip" id="tip"></div>

<script>
const zones = [
  { id: 'z-m', layer: 'layer-m', label: 'Media',         href: 'mp3-media.html' },
  { id: 'z-p', layer: 'layer-p', label: 'Products',      href: 'mp3-product.html' },
  { id: 'z-e', layer: 'layer-e', label: 'Everything Else', href: 'mp3-everything.html' },
];

const tip = document.getElementById('tip');

zones.forEach(({ id, layer, label, href }) => {
  const zone = document.getElementById(id);
  const lyr  = document.getElementById(layer);

  zone.addEventListener('mouseenter', () => {
    lyr.classList.add('hovered');
    tip.textContent = label;
    tip.className = 'tip show';
  });
  zone.addEventListener('mousemove', e => {
    tip.style.left = e.clientX + 'px';
    tip.style.top  = e.clientY + 'px';
  });
  zone.addEventListener('mouseleave', () => {
    lyr.classList.remove('hovered');
    tip.className = 'tip';
  });
  zone.addEventListener('click', () => {
    window.location.href = href;
  });
});
</script>
